<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Remote Desktop Control{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">RDC</div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Desktop</a>
            <a href="/terminal" class="nav-link {% if request.path == '/terminal' %}active{% endif %}">Terminal</a>
            <a href="/files" class="nav-link {% if request.path == '/files' %}active{% endif %}">Files</a>
            <a href="/logout" class="nav-link">Logout</a>
        </div>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
