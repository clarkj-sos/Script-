{% extends "base.html" %}

{% block title %}Desktop - RDC{% endblock %}

{% block content %}
<div class="desktop-container">
    <div class="desktop-toolbar">
        <span id="status" class="status disconnected">Disconnected</span>
        <label>FPS: <input type="range" id="fps" min="1" max="30" value="10" title="FPS"></label>
        <label>Quality: <input type="range" id="quality" min="10" max="100" value="50" title="Quality"></label>
    </div>
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="screen" tabindex="0"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/desktop.js"></script>
{% endblock %}
