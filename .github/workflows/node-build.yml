name: youtube-mcp-server build

on:
  push:
    branches: ["main"]
    paths:
      - "youtube-mcp-server/**"
      - ".github/workflows/node-build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "youtube-mcp-server/**"
      - ".github/workflows/node-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: youtube-mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: youtube-mcp-server/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Verify build output
        run: test -f dist/index.js
